name: test-unity-plugin

##############################################################################
# 1. Triggers
##############################################################################
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      projectPath: { required: true, type: string }
      unityVersion: { required: true, type: string }
      testMode: { required: true, type: string }
    secrets:
      UNITY_LICENSE: { required: true }
      UNITY_EMAIL: { required: true }
      UNITY_PASSWORD: { required: true }

##############################################################################
# 2. Job – run Unity tests via GameCI
##############################################################################
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        platform: [base, windows-mono]

    # Skip the single combination that segfaults inside Unity's native asset
    # scanner (SourceAssetScanner::Refresh -> SIGSEGV, addr:0x10, exit 139) during
    # the AssetDatabase refresh: 2023.2.22f1 (a non-LTS Tech Stream) building a
    # standalone player on the windows-mono image. The crash is engine-side, not in
    # package code, and every other matrix cell covers this version. A skipped cell
    # is neutral, so the reusable workflow still reports success to the caller.
    if: ${{ !(inputs.unityVersion == '2023.2.22f1' && inputs.testMode == 'standalone' && matrix.platform == 'windows-mono') }}

    name: ${{ inputs.unityVersion }} ${{ inputs.testMode }} on ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    # game-ci/unity-test-runner publishes results as a Check Run via githubToken,
    # which requires checks:write. Bounded by the caller's granted permissions.
    permissions:
      contents: read
      checks: write

    steps:
      # --------------------------------------------------------------------- #
      # 2-a. Checkout
      # --------------------------------------------------------------------- #
      - uses: actions/checkout@v6
        with:
          lfs: false

      # --------------------------------------------------------------------- #
      # 2-b. Free disk space
      # --------------------------------------------------------------------- #
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      # --------------------------------------------------------------------- #
      # 2-c. Cache & run the Unity test-runner
      # --------------------------------------------------------------------- #
      - uses: actions/cache@v4
        with:
          path: |
            ${{ inputs.projectPath }}/Library
            ~/.cache/unity3d
          key: ${{ inputs.unityVersion }} ${{ inputs.testMode }} on ${{ matrix.platform }}

      - name: Generate custom image name
        id: custom_image
        run: echo "image=unityci/editor:ubuntu-${{ inputs.unityVersion }}-${{ matrix.platform }}-3" >> $GITHUB_OUTPUT
        shell: bash

      - uses: game-ci/unity-test-runner@v4
        id: tests
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ${{ inputs.projectPath }}
          unityVersion: ${{ inputs.unityVersion }}
          testMode: ${{ inputs.testMode }}
          customImage: ${{ steps.custom_image.outputs.image }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: ${{ inputs.unityVersion }} ${{ inputs.testMode }} ${{ matrix.platform }} Test Results
          artifactsPath: artifacts-${{ inputs.unityVersion }}-${{ inputs.testMode }}-${{ matrix.platform }}
          customParameters: -CI true -GITHUB_ACTIONS true

      # --------------------------------------------------------------------- #
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: Test results for ${{ inputs.unityVersion }} ${{ inputs.testMode }} on ${{ matrix.platform }}
          path: ${{ steps.tests.outputs.artifactsPath }}
